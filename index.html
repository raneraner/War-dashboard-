<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ran's Holon Radar</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        @-webkit-keyframes flicker { 0% { opacity: 0.96; } 50% { opacity: 1; } 100% { opacity: 0.98; } }
        @-webkit-keyframes redAlert { 0% { background-color: black; } 50% { background-color: #ff0000; } 100% { background-color: black; } }
        @-webkit-keyframes orangeAlert { 0% { background-color: black; } 50% { background-color: #ff7700; } 100% { background-color: black; } }

        body::after {
          content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
          background: -webkit-linear-gradient(top, rgba(0,0,0,0) 50%, rgba(0,0,0,0.1) 50%);
          background-size: 100% 4px; z-index: 999; pointer-events: none;
        }

        body { 
            background-color: black; color: #00FF00; font-family: monospace; 
            text-align: center; padding-top: 3%; overflow: hidden; direction: rtl;
            -webkit-animation: flicker 0.15s infinite;
        }

        body.emergency { -webkit-animation: redAlert 0.4s infinite !important; }
        body.emergency #holon-status { 
            border-color: #ffffff; color: #ffffff; background-color: #ff0000;
            font-weight: bold; font-size: 55px;
        }

        body.warning { -webkit-animation: orangeAlert 0.6s infinite !important; }
        body.warning #holon-status { 
            border-color: #ffffff; color: #ffffff; background-color: #ff7700;
            font-weight: bold; font-size: 50px;
        }

        .separator { border-top: 2px dashed #004400; margin: 25px auto; width: 90%; }
        .section-title { font-size: 26px; color: #005500; margin-bottom: 12px; }

        #clock { font-size: 90px; margin-bottom: 0; }
        #date { font-size: 32px; color: #008800; margin-top: 5px; }

        #temp { font-size: 60px; font-weight: bold; margin-bottom: 7px; }
        #rain-info { font-size: 28px; }

        #holon-status { 
            font-size: 48px; border: 3px solid #00FF00; display: inline-block; 
            padding: 12px 30px; margin-top: 5px; color: #00FF00;
        }

        #debug-info { font-size: 20px; color: #007700; margin-top: 15px; }
        #timer { font-size: 42px; font-weight: bold; white-space: nowrap; }
    </style>
</head>
<body>
    
    <div id="clock">00:00:00</div>
    <div id="date">--/--/----</div>

    <div class="separator"></div>

    <div class="section-title">מזג אוויר:</div>
    <div id="temp">--°C</div>
    <div id="rain-info">בודק צפי לגשם...</div>

    <div class="separator"></div>

    <div class="section-title">מלחמה:</div>
    <div id="holon-status">חולון: אין התרעות</div>
    <div id="debug-info">רשת: מתחבר לשרת ישראלי...</div>

    <div class="separator"></div>

    <div class="section-title">יומולדת 8 לעומר:</div>
    <div id="timer">טוען...</div>

    <script>
        var lastKnownHolonAlert = ""; 

        function updateClock() {
            var now = new Date();
            var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            if (h < 10) h = "0" + h; if (m < 10) m = "0" + m; if (s < 10) s = "0" + s;
            document.getElementById("clock").innerHTML = h + ":" + m + ":" + s;
            document.getElementById("date").innerHTML = now.toLocaleDateString("he-IL");
        }

        function updateWeather() {
            var url = "https://api.open-meteo.com/v1/forecast?latitude=32.01&longitude=34.78&current_weather=true&daily=precipitation_sum&timezone=Asia%2FJerusalem";
            
            fetch(url).then(function(r){return r.json()}).then(function(data){
                document.getElementById("temp").innerHTML = Math.round(data.current_weather.temperature) + "°C";
                var currentCode = data.current_weather.weathercode;
                var rainToday = data.daily.precipitation_sum[0];
                var rainTomorrow = data.daily.precipitation_sum[1];
                var rText = "אין צפי לגשם בימים הקרובים";
                
                if (currentCode === 61 || currentCode === 63 || currentCode === 65 || 
                    currentCode === 80 || currentCode === 81 || currentCode === 82) {
                    rText = "גשום כרגע!";
                } else if (rainToday > 0) {
                    rText = "גשם צפוי הלילה";
                } else if (rainTomorrow > 0) {
                    rText = "גשם צפוי מחר";
                }
                document.getElementById("rain-info").innerHTML = rText;
            });
        }

        function checkHolonAlert() {
            // התחברות ישירה ל-API הקהילתי הישראלי, ללא שום מתווך
            var targetUrl = "https://api.tzevaadom.co.il/alerts-history?v=" + new Date().getTime();
            var xhr = new XMLHttpRequest();
            
            xhr.open("GET", targetUrl, true);
            xhr.onreadystatechange = function() {
                var now = new Date();
                var debugDiv = document.getElementById("debug-info");

                if (xhr.readyState == 4) {
                    if (xhr.status == 200) {
                        try {
                            var rawText = xhr.responseText.trim();
                            var alerts = [];
                            
                            if (rawText !== "" && rawText.indexOf("<") !== 0) {
                                var parsedData = JSON.parse(rawText);
                                // תמיכה במבני נתונים שונים (מערך ישיר או בתוך אובייקט)
                                if (Array.isArray(parsedData)) {
                                    alerts = parsedData;
                                } else if (parsedData && Array.isArray(parsedData.alerts)) {
                                    alerts = parsedData.alerts;
                                } else if (parsedData && Array.isArray(parsedData.data)) {
                                    alerts = parsedData.data;
                                }
                            }
                            
                            // חיפוש חולון לעדכון הזיכרון
                            for (var j = 0; j < alerts.length; j++) {
                                // הפיכה לטקסט כדי ש-indexOf יעבוד גם אם זה מערך וגם אם מחרוזת
                                var cityData = JSON.stringify(alerts[j].data || "");
                                if (cityData.indexOf("חולון") !== -1) {
                                    var timeStr = alerts[j].alertDate || alerts[j].time || "";
                                    timeStr = timeStr.replace("T", " ").replace("Z", "");
                                    lastKnownHolonAlert = timeStr.split(" ")[1]; 
                                    break; 
                                }
                            }

                            if (lastKnownHolonAlert !== "") {
                                debugDiv.innerHTML = "אחרון בחולון: " + lastKnownHolonAlert + " | מחובר לישראל: " + now.toLocaleTimeString("he-IL");
                            } else {
                                debugDiv.innerHTML = "שקט בחולון (אין נתוני עבר) | מחובר לישראל: " + now.toLocaleTimeString("he-IL");
                            }

                            var isAlertInHolon = false;
                            var alertTitle = "";
                            
                            for (var i = 0; i < Math.min(alerts.length, 50); i++) {
                                var cityData = JSON.stringify(alerts[i].data || "");
                                if (cityData.indexOf("חולון") !== -1) {
                                    var dateStr = alerts[i].alertDate || alerts[i].time || "";
                                    dateStr = dateStr.replace("T", " ").replace("Z", "");
                                    var dtParts = dateStr.split(" ");
                                    var dParts = dtParts[0].split("-");
                                    var tParts = dtParts[1].split(":");
                                    
                                    var alertTime = new Date(dParts[0], dParts[1] - 1, dParts[2], tParts[0], tParts[1], tParts[2]);
                                    var diffMinutes = (now.getTime() - alertTime.getTime()) / (1000 * 60);
                                    
                                    if (diffMinutes <= 10 && diffMinutes >= 0) {
                                        isAlertInHolon = true;
                                        alertTitle = alerts[i].title || alerts[i].category || "";
                                        break; 
                                    }
                                }
                            }

                            var statusDiv = document.getElementById("holon-status");
                            if (isAlertInHolon) {
                                if (alertTitle.indexOf("בדקות הקרובות") !== -1 || alertTitle.indexOf("צפויות") !== -1) {
                                    document.body.className = "warning";
                                    statusDiv.innerHTML = "התרעות צפויות בדקות הקרובות";
                                } else if (alertTitle.indexOf("רקטות") !== -1 || alertTitle.indexOf("טילים") !== -1) {
                                    document.body.className = "emergency";
                                    statusDiv.innerHTML = "ירי רקטות וטילים!";
                                } else {
                                    document.body.className = "emergency";
                                    statusDiv.innerHTML = alertTitle !== "" ? alertTitle : "התרעה בחולון!";
                                }
                            } else {
                                document.body.className = "";
                                statusDiv.innerHTML = "חולון: אין התרעות";
                            }
                        } catch(e) {
                            debugDiv.innerHTML = "שגיאת פענוח נתונים | מחובר לישראל: " + now.toLocaleTimeString("he-IL");
                        }
                    } else {
                        debugDiv.innerHTML = "שגיאת רשת (" + xhr.status + ") | מחובר לישראל: " + now.toLocaleTimeString("he-IL");
                    }
                }
            };
            xhr.send();
        }

        function updateCountdown() {
            var target = new Date(2026, 3, 1, 0, 0, 0); 
            var diff = target - new Date();
            if (diff <= 0) { document.getElementById("timer").innerHTML = "מזל טוב!"; return; }
            var d = Math.floor(diff / 86400000);
            var h = Math.floor((diff % 86400000) / 3600000);
            var m = Math.floor((diff % 3600000) / 60000);
            var s = Math.floor((diff % 60000) / 1000);
            
            document.getElementById("timer").innerHTML = d + " ימים " + h + " שעות " + m + " דקות " + s + " שניות ";
        }

        setInterval(updateClock, 1000);
        setInterval(updateCountdown, 1000);
        setInterval(checkHolonAlert, 7000);
        setInterval(updateWeather, 900000);
        
        updateClock(); updateCountdown(); updateWeather(); checkHolonAlert();
    </script>
</body>
</html>
